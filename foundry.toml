[package]
name = "raindex-interface"
version = "0.1.1"

[profile.default]
src = 'src'
out = 'out'
libs = ['dependencies']

# See more config options https://github.com/foundry-rs/foundry/tree/master/config

solc = "0.8.25"

# Try to make sure the optimizer doesn't touch the output in a way that can break
# source maps for debugging.
# via_ir = false
# optimizer = false
# optimizer_runs = 0
# optimizer_steps = 0

# These settings should be used for snapshots
optimizer = true
optimizer_runs = 1000000

bytecode_hash = "none"
cbor_metadata = false

evm_version = "cancun"

[dependencies]
forge-std = "1.16.1"
rain-interpreter-interface = "0.1.0"
rain-math-float = "0.1.1"

[soldeer]
recursive_deps = false

[fuzz]
runs = 2048
